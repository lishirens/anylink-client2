name: Build Anylink Client

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build
        env:
          AGENT_ARCH: x64

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: my-app-exe
          path: build/
