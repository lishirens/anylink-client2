name: Build Anylink Client

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
        env:
          AGENT_ARCH: x64
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/
